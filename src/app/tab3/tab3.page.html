<!-- Stock Report Page - Tab 3 -->
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing stock">
    </ion-refresher-content>
  </ion-refresher>

  <main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">
    <!-- Loading State -->
    <ng-container *ngIf="isLoading">
      <div class="bg-surface-container-lowest rounded-xl p-6 border border-surface-variant shadow-soft mb-8">
        <div class="skeleton h-7 w-40 mb-2"></div>
        <div class="skeleton h-4 w-56 mb-4"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div *ngFor="let i of [1,2,3]" class="bg-surface-container-lowest rounded-md p-card_padding border border-surface-variant shadow-soft">
          <div class="skeleton h-4 w-24 mb-3"></div>
          <div class="skeleton h-12 w-20 mb-2"></div>
          <div class="skeleton h-3 w-20 mb-3"></div>
          <div class="skeleton h-6 w-36 rounded-sm mt-3"></div>
        </div>
      </div>
    </ng-container>

    <!-- Error State -->
    <ng-container *ngIf="hasError && !isLoading">
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">error_outline</span>
        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Failed to load Stock Report</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mb-6">Please check your connection and try again.</p>
        <button class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-label-bold text-label-bold flex items-center gap-2"
                (click)="loadData()">
          <span class="material-symbols-outlined text-lg">refresh</span> Retry
        </button>
      </div>
    </ng-container>

    <!-- Data State -->
    <ng-container *ngIf="!isLoading && !hasError && data">
      <!-- Header -->
      <div class="bg-surface-container-lowest rounded-xl p-6 border border-surface-variant shadow-soft mb-8">
        <div>
          <h1 class="font-headline-md font-bold text-on-surface text-2xl">Stock Report</h1>
          <div class="text-on-surface-variant mt-1">{{currentDate}}</div>
        </div>
      </div>

      <!-- Stock Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div *ngFor="let card of data.cards" class="bg-surface-container-lowest rounded-md p-card_padding border border-surface-variant shadow-soft flex flex-col justify-between">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-body-lg text-body-lg text-on-surface-variant font-semibold">{{card.title}}</h3>
            <div class="w-6 h-6 rounded flex items-center justify-center"
                 [class.bg-status-green-bg]="card.status === 'green'"
                 [class.text-status-green-text]="card.status === 'green'"
                 [class.bg-status-yellow-bg]="card.status === 'yellow'"
                 [class.text-status-yellow-text]="card.status === 'yellow'"
                 [class.bg-status-red-bg]="card.status === 'red'"
                 [class.text-status-red-text]="card.status === 'red'">
              <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1">
                {{card.status === 'green' ? 'check_circle' : 'warning'}}
              </span>
            </div>
          </div>
          <div>
            <div class="flex items-baseline gap-2 mb-1">
              <span class="font-kpi-display-mobile text-kpi-display-mobile text-on-surface font-extrabold">{{card.value}}</span>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant">{{card.unit}}</p>
          </div>
        </div>
      </div>
    </ng-container>
  </main>
</ion-content>
