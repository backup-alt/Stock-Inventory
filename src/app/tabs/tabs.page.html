<div class="flex flex-col min-h-screen bg-background">
  <!-- Top App Bar -->
  <header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant shadow-soft flex justify-between items-center px-4 h-14">
    <div class="flex items-center gap-3">
      <button class="p-1.5 rounded-md hover:bg-surface-container-high transition-colors active:scale-95 duration-150 text-on-surface-variant"
              (click)="toggleDrawer()">
        <span class="material-symbols-outlined text-xl text-primary">menu</span>
      </button>
      <h1 class="font-headline-md text-headline-md font-bold tracking-tight text-primary">{{appName}}</h1>
    </div>
    <button class="p-1.5 rounded-md hover:bg-surface-container-high transition-colors active:scale-95 duration-150 text-on-surface-variant"
            (click)="openPrintOptions()">
      <span class="material-symbols-outlined text-xl">print</span>
    </button>
  </header>

  <!-- Universal Side Drawer -->
  <nav aria-label="Sidebar Navigation"
       class="universal-side-nav fixed left-0 top-0 h-full w-72 z-[60] bg-surface-container-lowest shadow-xl flex flex-col p-4 gap-2 transition-transform duration-300"
       [class.translate-x-0]="drawerOpen || isDesktop"
       [class.-translate-x-full]="!drawerOpen && !isDesktop">
    <div class="mb-6 mt-2 px-4 flex items-center justify-between">
      <h2 class="font-headline-md text-headline-md text-primary font-bold">{{appName}} Menu</h2>
      <button aria-label="Close menu"
              class="text-on-surface-variant hover:text-on-surface transition-colors p-1 rounded-full hover:bg-surface-container-high"
              (click)="toggleDrawer()">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>
    <ul class="flex flex-col gap-2 font-body-lg text-body-lg">
      <li *ngFor="let item of sideNavItems; let i = index">
        <a class="side-nav-item flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-200 active:scale-[0.98] cursor-pointer"
           [class.side-nav-item-active]="activeSideIndex === i"
           [class.text-on-surface-variant]="activeSideIndex !== i"
           [class.hover\:bg-surface-container-high]="activeSideIndex !== i"
           (click)="navigateSide(i)">
          <span class="material-symbols-outlined"
                [style.fontVariationSettings]="activeSideIndex === i ? '&quot;FILL&quot; 1' : '&quot;FILL&quot; 0'">{{item.icon}}</span>
          <span class="font-body-md text-body-md">{{item.label}}</span>
        </a>
      </li>
    </ul>
    <div class="mt-auto border-t border-outline-variant pt-4 px-4">
      <div class="flex items-center gap-3 text-on-surface-variant">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-label-bold text-label-bold">JD</div>
        <div class="flex flex-col">
          <span class="font-label-bold text-label-bold text-on-surface">John Doe</span>
          <span class="text-[11px] text-on-surface-variant">Warehouse Manager</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Drawer Backdrop (Mobile) -->
  <div *ngIf="drawerOpen && !isDesktop"
       class="fixed inset-0 bg-black/30 z-[55] md:hidden transition-opacity"
       (click)="toggleDrawer()"></div>

  <!-- Main Content -->
  <div class="app-content" [class.keyboard-active]="keyboardActive">
    <ion-tabs #tabs (ionTabsDidChange)="onTabChange($event)">
      <ion-tab-bar slot="bottom" style="display:none">
        <ion-tab-button *ngFor="let item of primaryNavItems" [tab]="item.route">
          <ion-label>{{item.label}}</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
  </div>

  <!-- Bottom Navigation (Primary) -->
  <nav class="mobile-bottom-nav md:hidden fixed bottom-0 left-0 right-0 bg-surface border-t border-outline-variant flex items-center justify-around px-2 z-50"
       [class.mobile-nav-hidden]="keyboardActive">
    <button *ngFor="let item of primaryNavItems; let i = index"
            type="button"
            class="mobile-tab-item flex flex-col items-center gap-1 flex-1 cursor-pointer py-1"
            [class.active-tab]="activePrimaryIndex === i"
            [class.text-on-surface-variant]="activePrimaryIndex !== i"
            (click)="navigatePrimary(i)">
      <span class="material-symbols-outlined text-2xl"
            [style.fontVariationSettings]="activePrimaryIndex === i ? '&quot;FILL&quot; 1' : '&quot;FILL&quot; 0'">{{item.icon}}</span>
      <span class="text-[10px] font-label-bold">{{item.label}}</span>
    </button>
  </nav>

  <!-- Print / PDF Prompt -->
  <div *ngIf="showPrintOptions"
       class="fixed inset-0 z-[70] bg-black/30 flex items-end sm:items-center justify-center p-4"
       (click)="closePrintOptions()">
    <div class="bg-surface rounded-lg shadow-soft-modal border border-outline-variant w-full max-w-sm p-4"
         (click)="$event.stopPropagation()">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-headline-md text-headline-md text-on-surface">Print Options</h2>
        <button class="p-1 rounded-full hover:bg-surface-container-high text-on-surface-variant"
                (click)="closePrintOptions()">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
      </div>
      <div class="space-y-2">
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-container-high transition-colors"
                (click)="savePdf()">
          <span class="material-symbols-outlined text-primary">download</span>
          <span class="font-body-md text-body-md font-semibold">Save PDF to device</span>
        </button>
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-container-high transition-colors"
                (click)="sharePdf()">
          <span class="material-symbols-outlined text-primary">ios_share</span>
          <span class="font-body-md text-body-md font-semibold">Share a PDF</span>
        </button>
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-container-high transition-colors"
                (click)="printDocument()">
          <span class="material-symbols-outlined text-primary">picture_as_pdf</span>
          <span class="font-body-md text-body-md font-semibold">Print / system Save as PDF</span>
        </button>
        <button *ngIf="showSavedPdfAction"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg border border-primary/30 bg-primary-container/20 text-on-surface hover:bg-primary-container/30 transition-colors"
                (click)="openSavedPdf()">
          <span class="material-symbols-outlined text-primary">folder_open</span>
          <span class="font-body-md text-body-md font-semibold">View saved PDF</span>
        </button>
        <p *ngIf="printStatusMessage" class="font-body-md text-[12px] text-on-surface-variant px-1 pt-1">{{printStatusMessage}}</p>
      </div>
    </div>
  </div>
</div>
