<!-- Packaging Inventory Page -->
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing inventory">
    </ion-refresher-content>
  </ion-refresher>

  <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 flex flex-col gap-gutter">
    <!-- Loading State -->
    <ng-container *ngIf="isLoading">
      <div class="skeleton h-4 w-32 mb-2"></div>
      <div class="skeleton h-8 w-56 mb-1"></div>
      <div class="skeleton h-4 w-64 mb-6"></div>
      <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
        <div class="bg-surface-container-low p-4 border-b border-outline-variant grid grid-cols-12 gap-2">
          <div class="col-span-7"><div class="skeleton h-3 w-28"></div></div>
          <div class="col-span-3"><div class="skeleton h-3 w-16 ml-auto"></div></div>
          <div class="col-span-2"><div class="skeleton h-3 w-12"></div></div>
        </div>
        <div *ngFor="let i of [1,2,3,4,5]" class="p-4 border-b border-outline-variant/20 grid grid-cols-12 gap-2">
          <div class="col-span-7"><div class="skeleton h-4 w-36"></div></div>
          <div class="col-span-3"><div class="skeleton h-4 w-14 ml-auto"></div></div>
          <div class="col-span-2"><div class="skeleton h-4 w-12"></div></div>
        </div>
      </div>
    </ng-container>

    <!-- Error State -->
    <ng-container *ngIf="hasError && !isLoading">
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">error_outline</span>
        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Unable to load {{pageTitle}}</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mb-6">Please try again later.</p>
        <button class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-label-bold text-label-bold flex items-center gap-2"
                (click)="loadData()">
          <span class="material-symbols-outlined text-lg">refresh</span> Retry
        </button>
      </div>
    </ng-container>

    <!-- Data State -->
    <ng-container *ngIf="!isLoading && !hasError && data">
      <div class="flex flex-col gap-stack_gap mb-4">
        <div class="flex items-center gap-2 text-on-surface-variant font-label-bold text-label-bold">
          <a class="hover:text-primary transition-colors text-primary" routerLink="/tabs/stock-report">{{data.breadcrumb[0]}}</a>
          <span class="material-symbols-outlined text-[16px] text-primary">chevron_right</span>
          <span class="text-primary font-bold">{{pageTitle}}</span>
        </div>
        <h1 class="font-headline-lg text-headline-lg text-on-surface">{{pageTitle}}</h1>
        <p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">{{pageDescription}}</p>
      </div>

      <div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/40 shadow-soft">
        <table class="w-full table-fixed text-left border-collapse">
          <thead>
            <tr class="bg-surface-container-low border-b border-surface-container text-on-surface-variant font-label-bold text-label-bold uppercase tracking-wider">
              <th class="py-3 px-2 w-[58%]">Product Group</th>
              <th class="py-3 px-2 text-right w-[24%]">Quantity</th>
              <th class="py-3 px-2 w-[18%]">Unit</th>
            </tr>
          </thead>
          <tbody class="font-body-md text-body-md text-on-surface divide-y divide-surface-container">
            <tr *ngFor="let row of displayRows"
                class="transition-colors hover:bg-surface-container-low"
                [class.bg-[#FEF2F2]]="row.item.status === 'out-of-stock'">
              <td class="py-3 px-2 text-on-surface-variant break-words">
                <span *ngIf="row.item.status === 'out-of-stock'" class="material-symbols-outlined text-error text-[16px] align-middle mr-1">warning</span>
                {{row.item.productGroup}} <span class="text-outline">({{row.label}})</span>
              </td>
              <td class="py-3 px-2 text-right font-bold"
                  [class.text-error]="row.item.status === 'out-of-stock'">{{row.item.quantity | number}}</td>
              <td class="py-3 px-2 text-on-surface-variant break-words">{{row.item.unit}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-container>
  </main>
</ion-content>
