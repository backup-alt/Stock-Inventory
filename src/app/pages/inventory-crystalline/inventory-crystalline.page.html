<!-- Crystalline Industrial Inventory Page -->
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing inventory">
    </ion-refresher-content>
  </ion-refresher>

  <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 flex flex-col gap-gutter">
    <!-- Loading State -->
    <ng-container *ngIf="isLoading">
      <div class="skeleton h-4 w-32 mb-2"></div>
      <div class="skeleton h-8 w-64 mb-1"></div>
      <div class="skeleton h-4 w-72 mb-6"></div>
      <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
        <div class="bg-surface-container-low p-4 border-b border-outline-variant flex gap-6">
          <div class="skeleton h-3 w-28"></div>
          <div class="skeleton h-3 w-16 ml-auto"></div>
          <div class="skeleton h-3 w-12"></div>
          <div class="skeleton h-3 w-16"></div>
        </div>
        <div *ngFor="let i of [1,2,3,4]" class="p-4 border-b border-outline-variant flex gap-6">
          <div class="skeleton h-4 w-36"></div>
          <div class="skeleton h-4 w-14 ml-auto"></div>
          <div class="skeleton h-4 w-12"></div>
          <div class="skeleton h-5 w-20 rounded"></div>
        </div>
      </div>
    </ng-container>

    <!-- Error State -->
    <ng-container *ngIf="hasError && !isLoading">
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">error_outline</span>
        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Unable to load Crystalline Inventory</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mb-6">Please try again later.</p>
        <button class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-label-bold text-label-bold flex items-center gap-2"
                (click)="loadData()">
          <span class="material-symbols-outlined text-lg">refresh</span> Retry
        </button>
      </div>
    </ng-container>

    <!-- Data State -->
    <ng-container *ngIf="!isLoading && !hasError && data">
      <!-- Breadcrumb -->
      <div class="flex items-center gap-2 text-on-surface font-label-bold text-label-bold">
        <a class="hover:text-primary transition-colors text-on-surface-variant" routerLink="/tabs/product-info">{{data.breadcrumb[0]}}</a>
        <span class="material-symbols-outlined text-[16px] text-on-surface-variant">chevron_right</span>
        <span class="text-primary font-semibold">{{data.breadcrumb[1]}}</span>
      </div>

      <!-- Header -->
      <h1 class="font-headline-lg text-headline-lg text-on-surface mt-2">{{data.title}}</h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant">{{data.description}}</p>

      <!-- Data Table -->
      <div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden w-full mt-2">
        <div class="w-full overflow-hidden">
          <table class="w-full table-fixed text-left border-collapse">
            <thead class="bg-surface-container-low border-b border-outline-variant">
              <tr>
                <th class="p-3 font-label-bold text-[10px] text-on-surface-variant uppercase tracking-wide w-[56%]">Product Group</th>
                <th class="p-3 font-label-bold text-[10px] text-on-surface-variant uppercase tracking-wide text-right w-[26%]">Quantity</th>
                <th class="p-3 font-label-bold text-[10px] text-on-surface-variant uppercase tracking-wide w-[18%]">Unit</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant">
              <tr *ngFor="let item of data.items"
                  class="transition-colors hover:brightness-[0.98]"
                  [class.bg-status-green-bg]="item.status === 'in-stock'"
                  [class.bg-status-yellow-bg]="item.status === 'low-stock'"
                  [class.bg-status-red-bg]="item.status === 'out-of-stock'">
                <td class="p-3 py-4 font-body-md font-medium text-on-surface break-words">
                  <span *ngIf="item.status === 'out-of-stock'" class="material-symbols-outlined text-status-red-text text-[16px] align-middle mr-1">warning</span>
                  {{item.productGroup}}
                </td>
                <td class="p-3 py-4 font-body-md text-right font-bold whitespace-nowrap text-on-surface">{{item.quantity | number}}</td>
                <td class="p-3 py-4 font-body-md text-on-surface-variant break-words">{{item.unit}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </ng-container>
  </main>
</ion-content>
