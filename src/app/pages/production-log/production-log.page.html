<!-- Production Log Page -->
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing production">
    </ion-refresher-content>
  </ion-refresher>

  <main class="flex-1 px-4 py-6 md:px-8 max-w-4xl mx-auto w-full flex flex-col gap-gutter">
    <!-- Loading State -->
    <ng-container *ngIf="isLoading">
      <div class="skeleton h-4 w-40 mb-2"></div>
      <div class="skeleton h-7 w-56 mb-6"></div>
      <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
        <div class="bg-surface-container-low p-4 border-b border-outline-variant flex gap-8">
          <div class="skeleton h-3 w-32"></div>
          <div class="skeleton h-3 w-20 ml-auto"></div>
          <div class="skeleton h-3 w-16"></div>
        </div>
        <div *ngFor="let i of [1,2,3,4,5]" class="p-4 border-b border-outline-variant/20 flex gap-8">
          <div class="skeleton h-4 w-44"></div>
          <div class="skeleton h-4 w-12 ml-auto"></div>
          <div class="skeleton h-4 w-14"></div>
        </div>
      </div>
    </ng-container>

    <!-- Error State -->
    <ng-container *ngIf="hasError && !isLoading">
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">cloud_off</span>
        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Unable to load Production Log</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mb-6">Please check your connection and try again.</p>
        <button class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-label-bold text-label-bold flex items-center gap-2"
                (click)="loadData()">
          <span class="material-symbols-outlined text-lg">refresh</span> Retry
        </button>
      </div>
    </ng-container>

    <!-- Data State -->
    <ng-container *ngIf="!isLoading && !hasError && data">
      <!-- Breadcrumb -->
      <nav class="flex items-center gap-2 text-sm font-medium">
        <a class="text-on-surface-variant hover:text-primary transition-colors" routerLink="/tabs/overall-report">{{data.breadcrumb[0]}}</a>
        <span class="material-symbols-outlined text-base text-on-surface-variant">chevron_right</span>
        <span class="text-on-surface font-semibold">{{data.breadcrumb[1]}}</span>
      </nav>

      <!-- Title -->
      <h2 class="text-xl font-bold text-on-surface mb-2">{{data.title}}</h2>

      <!-- Data Table -->
      <section class="bg-surface-container-lowest rounded-xl shadow-soft border border-outline-variant overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-surface-container-low border-b border-outline-variant">
              <tr>
                <th class="p-4 font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Product Group</th>
                <th class="p-4 font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider text-right">Quantity</th>
                <th class="p-4 font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider pl-4">Unit</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-surface-variant font-body-md">
              <tr *ngFor="let item of data.items"
                  [class.bg-error-container/10]="item.status === 'critical'"
                  [class.hover:bg-error-container/20]="item.status === 'critical'"
                  class="hover:bg-surface-container-lowest transition-colors">
                <td class="p-4 font-medium"
                    [class.text-on-error-container]="item.status === 'critical'"
                    [class.text-on-surface]="item.status !== 'critical'">
                  <div class="flex items-center gap-2">
                    <span *ngIf="item.status === 'critical'" class="material-symbols-outlined text-error text-lg">warning</span>
                    <span>{{item.productGroup}}</span>
                  </div>
                  <span *ngIf="item.subLabel" class="text-on-surface-variant font-normal text-sm">{{item.subLabel}}</span>
                </td>
                <td class="p-4 text-right font-semibold"
                    [class.text-error]="item.status === 'critical'"
                    [class.font-bold]="item.status === 'critical'">{{item.quantity | number}}</td>
                <td class="p-4 pl-4"
                    [class.text-on-error-container]="item.status === 'critical'"
                    [class.text-on-surface-variant]="item.status !== 'critical'">{{item.unit}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </ng-container>
  </main>
</ion-content>
