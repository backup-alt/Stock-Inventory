services:
  - type: web
    name: ledgerflow-api
    runtime: node
    plan: free
    buildCommand: cd ledgerflow-api && npm install
    startCommand: cd ledgerflow-api && npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: LEDGERFLOW_UPDATES_FILE
        value: /tmp/inventory-updates.json
      - key: SUMMARY_REPORTS_URL
        value: https://ktm-salt.onrender.com/reports/getSummaryReports
      - key: STOCK_REPORTS_URL
        value: https://ktm-salt.onrender.com/reports/getStockReports
